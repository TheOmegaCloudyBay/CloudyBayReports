<script>
const DATA = JSON.parse(document.getElementById('ga-data').textContent);
const fmt = n => (n==null?"—":Number(n).toLocaleString());
const esc = s => String(s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const dstr = ms => new Date(ms).toLocaleDateString(undefined,{month:'short',day:'numeric'});

document.getElementById('sub').textContent = `${DATA.guild} · ${DATA.members.length} members · snapshot ${DATA.generatedAt}`;
document.getElementById('foot').textContent =
  `Raids: ${DATA.raidCount} · TBs: ${DATA.tbCount} · TWs: ${DATA.twCount}. Raid/TB history grows as the report is re-run; TW is guild-level.`;

function chartBlock(hist,label,stroke,dot,unit){
  const h=(hist||[]).slice().sort((a,b)=>a.t-b.t);
  if(h.length===0) return `<div class="muted">No ${unit} data yet.</div>`;
  if(h.length===1) return `<div class="muted"><b>${label}</b>: ${fmt(h[0].score)} (1 ${unit} so far — history builds as the report re-runs).</div>`;
  const W=Math.min(720,60+h.length*90),H=140,pad=28;
  const xs=h.map((_,i)=>pad+i*((W-2*pad)/(h.length-1)));
  const max=Math.max(...h.map(p=>p.score)),min=Math.min(...h.map(p=>p.score));
  const y=v=>H-pad-(max===min?(H-2*pad)/2:(v-min)/(max-min)*(H-2*pad));
  const pts=h.map((p,i)=>`${xs[i]},${y(p.score)}`).join(" ");
  const dots=h.map((p,i)=>`<circle cx="${xs[i]}" cy="${y(p.score)}" r="3" fill="${dot}"><title>${fmt(p.score)}</title></circle>`).join("");
  const lbl=h.map((p,i)=>i%Math.ceil(h.length/6)===0?`<text x="${xs[i]}" y="${H-8}" font-size="9" fill="#9aa4b2" text-anchor="middle">${dstr(p.t)}</text>`:"").join("");
  return `<div style="margin-top:6px"><b>${label}</b> — ${h.length} ${unit} (max ${fmt(max)})</div>
    <svg viewBox="0 0 ${W} ${H}" width="${W}"><polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="2"/>${dots}${lbl}</svg>`;
}

function memberTable(tableId, cols, chartCfg){
  let key=cols.find(c=>c.def)?.k||cols[0].k, asc=false;
  const tbl=document.getElementById(tableId);
  function draw(){
    const rows=[...DATA.members].filter(m=>m[chartCfg.metric]!=null || key==='name').sort((a,b)=>{
      let x=a[key],y=b[key];
      if(typeof x==="string"||typeof y==="string"){x=String(x||"");y=String(y||"");return asc?x.localeCompare(y):y.localeCompare(x);}
      x=x??-1;y=y??-1;return asc?x-y:y-x;
    });
    tbl.innerHTML=`<thead><tr>${cols.map(c=>`<th data-k="${c.k}" class="${c.k===key?(asc?'asc':'act'):''}">${c.label}</th>`).join("")}</tr></thead>`+
      `<tbody>${rows.map(m=>`<tr class="mem" data-id="${m.id}">${cols.map(c=>`<td class="${c.cls||'num'}">${c.render(m)}</td>`).join("")}</tr>`).join("")}</tbody>`;
    tbl.querySelectorAll('th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(k===key)asc=!asc;else{key=k;asc=false;}draw();});
    tbl.querySelectorAll('tr.mem').forEach(tr=>tr.onclick=()=>{
      const nx=tr.nextElementSibling; if(nx&&nx.classList.contains('detail')){nx.remove();return;}
      tbl.querySelectorAll('tr.detail').forEach(e=>e.remove());
      const m=DATA.members.find(x=>x.id===tr.dataset.id);
      const d=document.createElement('tr');d.className='detail';
      d.innerHTML=`<td colspan="${cols.length}" class="chart">${chartBlock(m[chartCfg.hist],esc(m.name)+" — "+chartCfg.label,chartCfg.stroke,chartCfg.dot,chartCfg.unit)}${chartCfg.extra?chartCfg.extra(m):""}</td>`;
      tr.after(d);
    });
  }
  draw();
}

(function(){
  const tw=[...(DATA.tw||[])].sort((a,b)=>b.t-a.t);
  const chartData=[...tw].reverse().map(w=>({t:w.t,score:w.score}));
  document.getElementById('tw-chart').innerHTML=chartData.length?chartBlock(chartData,DATA.guild+" — TW score",'var(--accent)','#e11d33','wars'):"";
  const wins=tw.filter(w=>w.win).length;
  document.getElementById('t-tw').innerHTML=
    `<thead><tr><th class="l">War ended</th><th>Our score</th><th>Opponent</th><th>Result</th><th>Guild power</th></tr></thead>`+
    `<tbody>${tw.map(w=>`<tr><td class="l">${dstr(w.t)}</td><td class="num">${fmt(w.score)}</td><td class="num">${fmt(w.opp)}</td>
      <td class="num ${w.win?'win':'loss'}">${w.win?'WIN':'LOSS'}</td><td class="num">${fmt(w.power)}</td></tr>`).join("")}</tbody>`;
  if(tw.length){const c=document.createElement('p');c.className='muted';c.textContent=`Record: ${wins}W – ${tw.length-wins}L over ${tw.length} wars.`;document.getElementById('pane-tw').insertBefore(c,document.getElementById('tw-chart'));}
})();

document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id==='pane-'+b.dataset.tab));
});
</script>
