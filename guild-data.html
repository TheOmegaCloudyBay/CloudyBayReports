<style>

  *{box-sizing:border-box}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;line-height:1.5;

  th.act::after{content:" \25BE";color:var(--accent)} th.asc::after{content:" \25B4";color:var(--accent)}
  tr:hover td{background:var(--card)}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .dot.ok{background:var(--good)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)}
  .seen.warn{color:var(--warn)} .seen.bad{color:var(--bad);font-weight:600}
  .tickbar{display:inline-block;width:60px;height:7px;border-radius:4px;background:#0c1017;
    border:1px solid var(--line);overflow:hidden;vertical-align:middle;margin-left:6px}
  .tickbar i{display:block;height:100%;background:var(--bar)}
  td.num{font-variant-numeric:tabular-nums}
  footer{margin-top:28px;color:#5c6674;font-size:12px}
  @media (prefers-color-scheme: light){:root{--bg:#eef1f5;--card:#fff;--line:#d3dae4;--txt:#18202c;--dim:#5a6576}}
</style>

<script>
const DATA = JSON.parse(document.getElementById('ga-data').textContent);
const fmt = n => (n==null?"—":Number(n).toLocaleString());
const esc = s => String(s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const NOW = Date.now();
document.getElementById('sub').textContent = `${DATA.guild} · ${DATA.members.length} members · snapshot ${DATA.generatedAt}`;

function seen(ms){
  if(!ms) return {cls:"",dot:"ok",txt:"—"};
  const h=(NOW-ms)/3600000, cls=h>72?"bad":h>36?"warn":"", dot=h>72?"bad":h>36?"warn":"ok";
  const txt=h<24?Math.round(h)+"h":Math.floor(h/24)+"d "+Math.round(h%24)+"h";
  return {cls,dot,txt};
}
const cols=[
  {k:'name',label:'Member',cls:'l',render:m=>esc(m.name)},
  {k:'avgTickets',label:'Avg tickets/day',def:true,render:m=>fmt(m.avgTickets)},
  {k:'ticketsToday',label:'Today',render:m=>`${m.ticketsToday}<span class="tickbar"><i style="width:${Math.min(100,m.ticketsToday/600*100)}%"></i></span>`},
  {k:'lastActive',label:'Last seen',cls:'',render:m=>{const s=seen(m.lastActive);return `<span class="num seen ${s.cls}"><span class="dot ${s.dot}"></span>${s.txt}</span>`;}},
];
let key='avgTickets', asc=false;
function draw(){
  const rows=[...DATA.members].sort((a,b)=>{
    let x=a[key],y=b[key];
    if(typeof x==="string"||typeof y==="string"){x=String(x||"");y=String(y||"");return asc?x.localeCompare(y):y.localeCompare(x);}
    x=x??-1;y=y??-1;return asc?x-y:y-x;
  });
  const t=document.getElementById('t');
  t.innerHTML=`<thead><tr>${cols.map(c=>`<th data-k="${c.k}" class="${c.k===key?(asc?'asc':'act'):''}">${c.label}</th>`).join("")}</tr></thead>`+
    `<tbody>${rows.map(m=>`<tr>${cols.map(c=>`<td class="${c.cls||'num'}">${c.render(m)}</td>`).join("")}</tr>`).join("")}</tbody>`;
  t.querySelectorAll('th').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(k===key)asc=!asc;else{key=k;asc=false;}draw();});
}
draw();
</script>
