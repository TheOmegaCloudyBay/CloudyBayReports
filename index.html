<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cloudy Bay</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;line-height:1.6;
    max-width:640px;margin:0 auto;padding:48px 20px;color:#e6e9ef;background:#0f141c}
  .hero{position:relative;border-radius:14px;overflow:hidden;margin:0 0 26px;
    border:1px solid #2a3442;box-shadow:0 8px 28px rgba(0,0,0,.45)}
  .hero img{display:block;width:100%;height:auto}
  .hero .cap{position:absolute;left:0;right:0;bottom:0;padding:34px 22px 16px;
    background:linear-gradient(to top,rgba(9,12,18,.92),rgba(9,12,18,.55) 55%,transparent)}
  .hero h1{margin:0;font-size:30px;text-shadow:0 2px 10px rgba(0,0,0,.8)}
  .hero p{margin:2px 0 0;color:#cdd4de;text-shadow:0 1px 6px rgba(0,0,0,.8)}
  h1{font-size:30px;margin:0 0 6px}
  p{color:#9aa4b2;margin:0 0 26px}
  ul{list-style:none;padding:0;margin:0}
  li{margin:10px 0}
  a{display:block;padding:14px 18px;border:1px solid #2a3442;border-radius:10px;
    color:#e6e9ef;text-decoration:none;font-size:17px;background:#161d28}
  a:hover{border-color:#e11d33;color:#fff}
  a span{display:block;font-size:13px;color:#9aa4b2;margin-top:2px}
  footer{margin-top:28px;color:#5c6674;font-size:12px}
  @media (prefers-color-scheme: light){
    body{color:#18202c;background:#eef1f5} p,a span,footer{color:#5a6576}
    a{background:#fff;border-color:#d3dae4;color:#18202c}
    .hero h1{color:#fff} .hero p{color:#e4e8ee}
  }
</style>
</head>
<body>
  <div class="hero">
    <img src="banner.jpg" alt="Cloudy Bay">
    <div class="cap">
      <h1>Welcome to Cloudy Bay</h1>
      <p>SWGoH guild reports — Rise of the Empire.</p>
    </div>
  </div>
  <ul>
    <li><a href="reva-readiness.html">Reva Readiness<span>Who can field the Inquisitor team for the Reva special mission</span></a></li>
    <li><a href="rote-platoons.html">RotE Platoons<span>Platoon fill by planet/level, assignments, and who's closest</span></a></li>
  </ul>
  <footer>Public game data. Reports are snapshots, refreshed periodically.</footer>
</body>
</html>
