<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RotE Platoons</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#0b0e14; --panel:#131a25; --panel-2:#1a2331; --line:#26313f; --line-soft:#1e2632;
    --ink:#d6dbe4; --ink-dim:#8a94a4; --ink-faint:#5c6674;
    --accent:#e11d33; --accent-glow:rgba(225,29,51,.16);
    --ok:#33a852; --ok-bg:rgba(51,168,82,.16); --ok-line:rgba(51,168,82,.5);
    --warn:#d4a029; --warn-bg:rgba(212,160,41,.16); --warn-line:rgba(212,160,41,.5);
    --bad:#e05264; --bad-bg:rgba(224,82,100,.14); --bad-line:rgba(224,82,100,.45);
    --ship:#2bb6c4; --ship-bg:rgba(43,182,196,.14);
    --font-display:"Segoe UI",system-ui,-apple-system,sans-serif;
    --font-mono:ui-monospace,"Cascadia Mono","SF Mono",Consolas,monospace;
    --shadow:0 1px 0 rgba(255,255,255,.02),0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#eaeef3; --panel:#fff; --panel-2:#f4f6f9; --line:#d3dae4; --line-soft:#e4e9f0;
      --ink:#18202c; --ink-dim:#5a6576; --ink-faint:#8b95a4;
      --accent:#cf1730; --accent-glow:rgba(207,23,48,.1);
      --ok:#1f8a44; --ok-bg:rgba(31,138,68,.13); --ok-line:rgba(31,138,68,.4);
      --warn:#a9761a; --warn-bg:rgba(200,150,30,.15); --warn-line:rgba(169,118,26,.4);
      --bad:#c33145; --bad-bg:rgba(195,49,69,.1); --bad-line:rgba(195,49,69,.4);
      --ship:#0f8a99; --ship-bg:rgba(15,138,153,.12);
      --shadow:0 1px 2px rgba(20,30,50,.06),0 10px 26px rgba(30,45,70,.1);
    }
  }
  :root[data-theme="light"]{
    --bg:#eaeef3; --panel:#fff; --panel-2:#f4f6f9; --line:#d3dae4; --line-soft:#e4e9f0;
    --ink:#18202c; --ink-dim:#5a6576; --ink-faint:#8b95a4;
    --accent:#cf1730; --ok:#1f8a44; --ok-bg:rgba(31,138,68,.13); --ok-line:rgba(31,138,68,.4);
    --warn:#a9761a; --warn-bg:rgba(200,150,30,.15); --warn-line:rgba(169,118,26,.4);
    --bad:#c33145; --bad-bg:rgba(195,49,69,.1); --bad-line:rgba(195,49,69,.4);
    --ship:#0f8a99; --ship-bg:rgba(15,138,153,.12); --shadow:0 1px 2px rgba(20,30,50,.06),0 10px 26px rgba(30,45,70,.1);
  }
  :root[data-theme="dark"]{ --bg:#0b0e14; --panel:#131a25; --panel-2:#1a2331; --line:#26313f; --ink:#d6dbe4; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-display);line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1200px 500px at 80% -10%,var(--accent-glow),transparent 70%)}
  .wrap{max-width:1320px;margin:0 auto;padding:28px 18px 80px}
  .eyebrow{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .head{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:20px}
  h1{font-size:clamp(26px,4vw,38px);margin:6px 0 8px;font-weight:800;letter-spacing:.02em}
  .sub{color:var(--ink-dim);font-size:13.5px;font-family:var(--font-mono)}
  .sub b{color:var(--ink);font-weight:600}
  .rules{margin-top:10px;display:flex;flex-wrap:wrap;gap:8px}
  .rule{padding:5px 11px;border:1px solid var(--line);border-radius:999px;background:var(--panel);
    font-family:var(--font-mono);font-size:12px;color:var(--ink-dim)}
  .rule b{color:var(--ink)}

  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
  .tab{padding:9px 15px;border:1px solid var(--line);background:var(--panel);border-radius:10px;cursor:pointer;
    font-family:var(--font-mono);font-size:13px;color:var(--ink-dim);display:flex;flex-direction:column;gap:2px;min-width:96px}
  .tab .zn{font-weight:700;color:var(--ink)}
  .tab .zs{font-size:10.5px;color:var(--ink-faint)}
  .tab.on{border-color:var(--accent);background:linear-gradient(180deg,var(--accent-glow),transparent)}
  .tab.on .zn{color:var(--accent)}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:14px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;box-shadow:var(--shadow)}
  .tile .lbl{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .tile .val{font-family:var(--font-mono);font-size:27px;font-weight:600;margin-top:5px;font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:6px}
  .tile .val small{font-size:14px;color:var(--ink-faint)}
  .tile.good{border-color:var(--ok-line)} .tile.good .val{color:var(--ok)}
  .tile.risk{border-color:var(--bad-line)} .tile.risk .val{color:var(--bad)}

  .ptoggles{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;align-items:center}
  .ptoggles .lab{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.11em;margin-right:2px}
  .ptoggles .allbtn{cursor:pointer;font-family:var(--font-mono);font-size:11px;color:var(--ink-dim);border:1px solid var(--line);border-radius:8px;padding:5px 9px;background:var(--panel)}
  .pchip{cursor:pointer;user-select:none;border:1px solid var(--line);background:var(--panel);border-radius:999px;
    padding:6px 12px;font-family:var(--font-mono);font-size:12px;color:var(--ink);display:inline-flex;align-items:center;gap:8px}
  .pchip .cb{width:14px;height:14px;border-radius:4px;border:1px solid var(--ink-faint);display:inline-block;position:relative;flex:0 0 auto}
  .pchip.on .cb{background:var(--accent);border-color:var(--accent)}
  .pchip.on .cb::after{content:"✓";position:absolute;inset:0;color:#fff;font-size:10px;text-align:center;line-height:14px}
  .pchip.off{opacity:.5} .pchip .al{font-size:10px;color:var(--ink-faint)}
  .pchip .mini{font-size:10.5px;color:var(--ok);font-weight:700}
  .pchip.ds.on{border-color:var(--accent)} .pchip.ls.on{border-color:var(--ship)}

  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:14px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel)}
  .seg button{border:0;background:transparent;color:var(--ink-dim);padding:8px 14px;cursor:pointer;font-family:var(--font-mono);font-size:12.5px}
  .seg button.on{background:var(--accent);color:#fff}
  .controls input[type=search]{flex:1;min-width:180px;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:9px 12px;font-family:var(--font-mono);font-size:13px}
  .controls input::placeholder{color:var(--ink-faint)}
  .legend{display:flex;flex-wrap:wrap;gap:14px;font-family:var(--font-mono);font-size:12px;color:var(--ink-dim);margin-left:auto}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
  .dot.ok{background:var(--ok)} .dot.warn{background:var(--warn)} .dot.bad{background:var(--bad)}

  .planet{margin:22px 0 8px;display:flex;align-items:center;gap:10px}
  .planet h2{font-size:15px;margin:0;font-weight:700}
  .planet .al{font-family:var(--font-mono);font-size:11px;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--ink-dim)}
  .planet .al.ds{color:var(--accent);border-color:var(--accent)}
  .planet .al.ls{color:var(--ship);border-color:var(--ship)}
  .planet .op{font-family:var(--font-mono);font-size:12px;color:var(--ink-faint)}
  .planet .tagoff{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-faint);border:1px dashed var(--line);border-radius:999px;padding:2px 9px}
  .planet.inactive{opacity:.45}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:12px;box-shadow:var(--shadow)}
  .card.hide{display:none}
  .card h3{margin:0 0 9px;font-size:13px;display:flex;align-items:center;gap:8px;font-weight:700}
  .card h3 .badge{margin-left:auto;font-family:var(--font-mono);font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;border:1px solid transparent}
  .badge.ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-line)}
  .badge.warn{color:var(--warn);background:var(--warn-bg);border-color:var(--warn-line)}
  .badge.bad{color:var(--bad);background:var(--bad-bg);border-color:var(--bad-line)}
  .badge.off{color:var(--ink-faint);background:transparent;border:1px dashed var(--line)}
  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  .slot{border:1px solid var(--line-soft);border-radius:8px;padding:6px 7px;cursor:pointer;min-height:52px;
    display:flex;flex-direction:column;justify-content:space-between;background:var(--panel-2);transition:border-color .12s}
  .slot:hover{border-color:var(--ink-faint)}
  .slot .nm{font-size:10.5px;line-height:1.2;color:var(--ink);overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .slot .meta{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .slot .cnt{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-faint)}
  .slot.ship{background:var(--ship-bg)}
  .slot.s-ok{border-color:var(--ok-line)} .slot.s-ok .cnt{color:var(--ok)}
  .slot.s-warn{border-color:var(--warn-line)}
  .slot.s-bad{border-color:var(--bad-line);background:var(--bad-bg)} .slot.s-bad .cnt{color:var(--bad)}
  .slot .who{font-family:var(--font-mono);font-size:10px;color:var(--ok);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .slot .none{font-family:var(--font-mono);font-size:10px;color:var(--bad)}

  .members{margin-top:8px}
  .mtable{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
  .mtable th{position:sticky;top:0;background:var(--panel-2);color:var(--ink-dim);font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;text-align:left;padding:10px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
  .mtable td{padding:8px 10px;border-bottom:1px solid var(--line-soft);vertical-align:top}
  .mtable tr:hover td{background:rgba(127,140,160,.05)}
  .mtable .num{font-family:var(--font-mono);text-align:center;font-variant-numeric:tabular-nums}
  .maxed{color:var(--warn);font-weight:700}
  .donate{font-family:var(--font-mono);font-size:11.5px;color:var(--ink-dim);line-height:1.7}
  .donate .u{display:inline-block;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:6px;padding:1px 7px;margin:1px 2px}
  .donate .u.crit{border-color:var(--bad-line);color:var(--bad)}
  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:13px;background:var(--panel);box-shadow:var(--shadow)}

  .ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:20px;z-index:20}
  .ov.on{display:flex}
  .pop{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:440px;width:100%;max-height:80vh;overflow:auto;box-shadow:var(--shadow)}
  .pop header{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .pop header .t{font-weight:700}
  .pop header .k{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint)}
  .pop header .x{margin-left:auto;cursor:pointer;color:var(--ink-dim);border:1px solid var(--line);border-radius:8px;padding:2px 9px}
  .pop .body{padding:12px 16px}
  .pop .req{font-family:var(--font-mono);font-size:12px;color:var(--ink-dim);margin-bottom:10px}
  .pop ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}
  .pop li{display:flex;align-items:center;gap:8px;font-size:13px;font-family:var(--font-mono);padding:4px 8px;border-radius:7px;background:var(--panel-2)}
  .pop li.asn{background:var(--ok-bg);color:var(--ok);font-weight:600}
  .pop li .star{margin-left:auto;font-size:11px}
  .pop .empty{color:var(--bad);font-family:var(--font-mono);font-size:13px}
  .pop .near{margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
  .pop .nearh{font-family:var(--font-mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--prog,var(--warn));font-weight:700;margin-bottom:6px}
  .pop li.near{display:flex;justify-content:space-between;background:var(--panel-2);color:var(--ink-dim)}
  .pop li.near .rr{font-family:var(--font-mono);color:var(--warn)}
  .pop li.near .gap{color:var(--bad);font-size:11px}
  footer{margin-top:26px;color:var(--ink-faint);font-size:12px;font-family:var(--font-mono);text-align:center;line-height:1.7}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const MEM = DATA.members;                 // index-aligned with slot.cand
const CAP = DATA.cap;
const fmt = n => n.toLocaleString('en-US');
let curZone = DATA.zones[0].zone;
let mode = 'assign';
let filter = '';
// relic required for a zone/level is fixed by the game (L1→R5 … L5/6→R9)
const relicReq = z => (DATA.relicByZone[z] ?? DATA.relicByZone[String(z)] ?? 9);
const activeByZone = {};                  // zone -> Set(active planet names)
let lastAsn = new Map();                  // slot key -> member idx (from the current solve)

const zoneOf = z => DATA.zones.find(x => x.zone === z);
const memName = i => (MEM[i]?.name ?? '?');
const skey = (planet, platoon, si) => planet + '#' + platoon + '#' + si;
function active(z){
  if (!activeByZone[z]) activeByZone[z] = new Set(zoneOf(z).planets.map(p => p.planet));
  return activeByZone[z];
}
const totalPlatoons = z => z.planets.reduce((a,p)=>a+p.platoons.length,0);

// header + rules
document.getElementById('guildName').textContent = DATA.guild;
document.getElementById('eyebrow').textContent = DATA.guild + ' · RotE Territory Battle';
document.getElementById('genAt').textContent = 'generated ' + DATA.generatedAt;
document.getElementById('memCount').textContent = DATA.total;
document.getElementById('rules').innerHTML =
  `<span class="rule">Donation cap <b>${CAP}</b> / member / day</span>` +
  `<span class="rule">Ship gate <b>${DATA.shipMinStars>0? DATA.shipMinStars+'★' : 'owned'}</b></span>` +
  `<span class="rule">Relic by level <b>L1 R${relicReq(1)} · L2 R${relicReq(2)} · L3 R${relicReq(3)} · L4 R${relicReq(4)} · L5/6 R${relicReq(6)}</b></span>`;

// tabs
document.getElementById('tabs').innerHTML = DATA.zones.map(z=>
  `<div class="tab" data-z="${z.zone}"><span class="zn">Zone ${z.zone}</span>`+
  `<span class="zs">${totalPlatoons(z)} platoons</span></div>`).join('');
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{curZone=+t.dataset.z;render();});

document.querySelectorAll('#mode button').forEach(b=>b.onclick=()=>{
  mode=b.dataset.mode;
  document.querySelectorAll('#mode button').forEach(x=>x.classList.toggle('on',x===b));
  render();
});
document.getElementById('q').addEventListener('input',e=>{filter=e.target.value.toLowerCase();render();});

// Recompute each slot's candidate list from ownership + the zone/level's fixed relic gate.
function applyGate(z){
  const req = relicReq(z.zone);
  z.planets.forEach(p=>p.platoons.forEach(pl=>pl.slots.forEach(s=>{
    s.cand = (s.own||[]).filter(o=>o.r>=req).map(o=>o.m);
  })));
}

// ---- Assignment over the ACTIVE planets of a zone --------------------------------------
// A platoon is only ever staffed if ALL 15 slots can be filled at once (a matching: distinct
// owned copies, nobody over their daily cap). Platoons that can't be completed get NOTHING —
// no donations are spent on them, so they don't eat into anyone's cap. We attempt the most
// constrained completable platoons first so scarce rosters aren't wasted on easy ones.
function solve(z){
  const act = active(z.zone);
  const plats = [];
  z.planets.forEach(p=>{
    if (!act.has(p.planet)) return;
    p.platoons.forEach(pl=>{
      const slots = pl.slots.map((s,si)=>({key:skey(p.planet,pl.platoon,si), baseId:s.baseId, cand:s.cand}));
      const coverable = slots.every(s=>s.cand.length>0);
      const scarcity = slots.reduce((a,s)=>a + (s.cand.length? 1/s.cand.length : 99), 0);
      plats.push({slots, coverable, scarcity});
    });
  });
  // coverable first; hardest (highest scarcity) first so tight platoons lock in their scarce donors
  plats.sort((a,b)=> (a.coverable?0:1)-(b.coverable?0:1) || b.scarcity-a.scarcity);

  const remaining = new Map(), used = new Set(), asn = new Map();
  for (const P of plats){
    if (!P.coverable) continue;
    const match = tryComplete(P.slots, remaining, used);   // full 15-slot matching or null
    if (match){
      for (const [key,{m,b}] of match){
        asn.set(key, m);
        used.add(m+'|'+b);
        remaining.set(m, (remaining.has(m)?remaining.get(m):CAP) - 1);
      }
    }
  }
  return {asn, remaining};
}

// Can this platoon's every slot be filled simultaneously, given who's already committed and each
// member's remaining cap? Solved as max-flow: source→slot→(member,unit)→member→sink(cap=remaining).
// Returns Map(slotKey -> {m, b}) if a complete matching exists, else null.
function tryComplete(slots, remaining, used){
  let N = 0; const src = N++;
  const slotNode = slots.map(()=>N++);
  const instOf = new Map();   // "m|b" -> node ; and reverse for extraction
  const instMB = new Map();   // node -> {m,b}
  const memOf = new Map();    // m -> node
  const inst = (m,b)=>{ const k=m+'|'+b; if(!instOf.has(k)){ const n=N++; instOf.set(k,n); instMB.set(n,{m,b}); } return instOf.get(k); };
  const mem = m=>{ if(!memOf.has(m)) memOf.set(m,N++); return memOf.get(m); };
  const raw = [];
  const instEdge = new Set();     // add each (member,unit)→member edge exactly once (one copy, one use)
  slots.forEach((s,i)=>{
    raw.push([src, slotNode[i], 1]);
    for (const m of s.cand){
      if (used.has(m+'|'+s.baseId)) continue;
      const ii = inst(m,s.baseId), mm = mem(m);
      raw.push([slotNode[i], ii, 1]);
      if (!instEdge.has(ii)){ instEdge.add(ii); raw.push([ii, mm, 1]); }
    }
  });
  const sink = N++;
  memOf.forEach((node,m)=>{ const cap = remaining.has(m)?remaining.get(m):CAP; if(cap>0) raw.push([node, sink, cap]); });

  // adjacency with residual edges
  const to=[], cap=[], head=Array(N).fill(-1), nxt=[];
  const add=(u,v,c)=>{ to.push(v);cap.push(c);nxt.push(head[u]);head[u]=to.length-1;
                       to.push(u);cap.push(0);nxt.push(head[v]);head[v]=to.length-1; };
  raw.forEach(([u,v,c])=>add(u,v,c));

  let flow=0;
  while(true){
    const par=Array(N).fill(-1), pe=Array(N).fill(-1); par[src]=src;
    const q=[src];
    while(q.length){ const u=q.shift();
      for(let e=head[u]; e!==-1; e=nxt[e]) if(cap[e]>0 && par[to[e]]===-1){ par[to[e]]=u; pe[to[e]]=e; q.push(to[e]); } }
    if(par[sink]===-1) break;
    // bottleneck is 1 (all source edges cap 1); push along path
    for(let v=sink; v!==src; v=par[v]){ cap[pe[v]]--; cap[pe[v]^1]++; }
    flow++;
  }
  if (flow !== slots.length) return null;

  const out = new Map();
  slots.forEach((s,i)=>{
    for(let e=head[slotNode[i]]; e!==-1; e=nxt[e]){
      // forward slot→inst edge that carried flow has residual 0 (even index = forward)
      if ((e%2===0) && cap[e]===0 && instMB.has(to[e])){ out.set(s.key, instMB.get(to[e])); break; }
    }
  });
  return out;
}

function render(){
  const z = zoneOf(curZone), act = active(curZone);
  applyGate(z);                              // set slot.cand from ownership + selected star relic
  const {asn, remaining} = solve(z);
  lastAsn = asn;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',+t.dataset.z===curZone));

  // KPIs over the active planets only
  let totPlat=0, complete=0, coverable=0, atRisk=0;
  z.planets.forEach(p=>{
    const on = act.has(p.planet);
    p.platoons.forEach(pl=>{
      let filled=0, cov=0;
      pl.slots.forEach((s,si)=>{
        if (s.cand.length>0) cov++; else if (on) atRisk++;
        if (asn.has(skey(p.planet,pl.platoon,si))) filled++;
      });
      if (on){ totPlat++; if (filled===pl.size) complete++; if (cov===pl.size) coverable++; }
    });
  });
  const maxed = [...remaining.values()].filter(v=>v===0).length;
  const activeCount = act.size, planetCount = z.planets.length;
  document.getElementById('kpis').innerHTML = [
    {lbl:'Completable now', val:complete, of:'/ '+totPlat+' active', cls:'good'},
    {lbl:'Coverable (no cap)', val:coverable, of:'/ '+totPlat},
    {lbl:'At-risk slots', val:atRisk, of:'no owner', cls: atRisk?'risk':''},
    {lbl:'Members at cap', val:maxed, of:'of '+DATA.total},
    {lbl:'Active planets', val:activeCount, of:'/ '+planetCount},
  ].map(k=>`<div class="tile ${k.cls||''}"><div class="lbl">${k.lbl}</div>
    <div class="val">${k.val}<small>${k.of||''}</small></div></div>`).join('');

  // planet toggles
  const chips = z.planets.map(p=>{
    const on = act.has(p.planet);
    let pc=0; p.platoons.forEach(pl=>{ let f=0; pl.slots.forEach((s,si)=>{ if(asn.has(skey(p.planet,pl.platoon,si)))f++; }); if(f===pl.size)pc++; });
    const al = p.align.includes('Dark')?'ds':p.align.includes('Light')?'ls':'';
    return `<span class="pchip ${on?'on':'off'} ${al}" data-p="${p.planet}"><span class="cb"></span>`+
      `${p.planet}<span class="al">${p.align.replace(' Side','')}</span>`+
      `${on?`<span class="mini">${pc}/${p.platoons.length}✓</span>`:''}</span>`;
  }).join('');
  document.getElementById('ptoggles').innerHTML =
    `<span class="lab">Active today</span>${chips}`+
    `<span class="allbtn" id="allOn">all</span><span class="allbtn" id="allOff">none</span>`;
  document.querySelectorAll('.pchip').forEach(c=>c.onclick=()=>{
    const p=c.dataset.p; if(act.has(p)) act.delete(p); else act.add(p); render();
  });
  document.getElementById('allOn').onclick=()=>{ z.planets.forEach(p=>act.add(p.planet)); render(); };
  document.getElementById('allOff').onclick=()=>{ act.clear(); render(); };

  const legend = document.getElementById('legend');
  const board = document.getElementById('board');
  if (mode==='members'){ legend.innerHTML=''; renderMembers(z,act,asn,remaining,board); return; }

  legend.innerHTML = mode==='assign'
    ? `<span><i class="dot ok"></i>assigned</span><span><i class="dot warn"></i>capped out</span><span><i class="dot bad"></i>no owner</span>`
    : `<span><i class="dot ok"></i>plenty</span><span><i class="dot warn"></i>tight (1)</span><span><i class="dot bad"></i>none</span>`;

  board.innerHTML = z.planets.map(p=>{
    const on = act.has(p.planet);
    const cards = p.platoons.map(pl=>{
      let filled=0, cov=0;
      pl.slots.forEach((s,si)=>{ if(s.cand.length>0)cov++; if(asn.has(skey(p.planet,pl.platoon,si)))filled++; });
      let badge, btxt;
      if (!on){ badge='off'; btxt=`${cov}/${pl.size} coverable`; }
      else if (filled===pl.size){ badge='ok'; btxt='complete'; }
      else if (cov===pl.size){ badge='warn'; btxt='can’t complete'; }
      else { badge='bad'; btxt=`${cov}/${pl.size} coverable`; }
      const cells = pl.slots.map((s,si)=>{
        const a = asn.get(skey(p.planet,pl.platoon,si));
        let cls, sub;
        if (mode==='assign'){
          if (!on){ cls=''; sub=`<div class="cnt">${s.cand.length} avail</div>`; }
          else if (a!=null){ cls='s-ok'; sub=`<div class="who" title="${memName(a)}">${memName(a)}</div>`; }
          else if (s.cand.length===0){ cls='s-bad'; sub=`<div class="none">none</div>`; }
          else { cls='s-warn'; sub=`<div class="cnt">${s.cand.length} avail</div>`; }
        } else {
          cls = s.cand.length===0?'s-bad':s.cand.length===1?'s-warn':'s-ok';
          sub = `<div class="cnt">${s.cand.length} cand</div>`;
        }
        return `<div class="slot ${cls}${s.kind==='ship'?' ship':''}" data-p="${p.planet}" data-pl="${pl.platoon}" data-si="${si}">
          <div class="nm">${s.name}</div><div class="meta">${sub}</div></div>`;
      }).join('');
      return `<div class="card" data-units="${pl.slots.map(s=>s.name.toLowerCase()).join('|')}">
        <h3>Platoon ${pl.platoon}<span class="badge ${badge}">${btxt}</span></h3>
        <div class="slots">${cells}</div></div>`;
    }).join('');
    const al = p.align.includes('Dark')?'ds':p.align.includes('Light')?'ls':'';
    return `<div class="planet${on?'':' inactive'}"><h2>${p.planet}</h2><span class="al ${al}">${p.align}</span>
      <span class="op">${p.operation||''}</span>${on?'':'<span class="tagoff">inactive</span>'}</div>
      <div class="grid">${cards}</div>`;
  }).join('');

  if (filter) board.querySelectorAll('.card').forEach(c=>c.classList.toggle('hide', !c.dataset.units.includes(filter)));
  board.querySelectorAll('.slot').forEach(el=>el.onclick=()=>openSlot(el));
}

function openSlot(el){
  const z = zoneOf(curZone);
  const p = z.planets.find(x=>x.planet===el.dataset.p);
  const pl = p.platoons.find(x=>x.platoon===+el.dataset.pl);
  const si = +el.dataset.si, s = pl.slots[si];
  const asnIdx = lastAsn.get(skey(p.planet,pl.platoon,si));
  const reqLvl = relicReq(z.zone);
  const req = s.kind==='ship' ? (DATA.shipMinStars>0?DATA.shipMinStars+'★':'owned/activated') : ('Level '+z.zone+' = Relic '+reqLvl+'+');
  const cands = s.cand.map(i=>({i,name:memName(i),asn:i===asnIdx}))
    .sort((a,b)=>(b.asn-a.asn)|| a.name.localeCompare(b.name));
  const readyList = cands.length
    ? '<ul>'+cands.map(c=>`<li class="${c.asn?'asn':''}">${c.name}${c.asn?'<span class="star">◄ assigned</span>':''}</li>`).join('')+'</ul>'
    : '<div class="empty">No one owns this at the required level.</div>';
  // closest below the requirement — owners a relic short (chars only), highest relic first
  const below = s.kind==='ship' ? [] : (s.own||[]).filter(o=>o.r<reqLvl)
    .sort((a,b)=>b.r-a.r).map(o=>({name:memName(o.m), r:o.r, gap:reqLvl-o.r}));
  const nearList = below.length
    ? `<div class="near"><div class="nearh">Closest below R${reqLvl} — ${below.length} owner(s)</div><ul>`+
      below.map(o=>`<li class="near"><span>${o.name}</span><span class="rr">R${o.r} <span class="gap">−${o.gap}</span></span></li>`).join('')+'</ul></div>'
    : '';
  document.getElementById('pop').innerHTML =
    `<header><div><div class="t">${s.name}</div><div class="k">${s.baseId} · ${s.kind}</div></div>
       <div class="x" id="popx">esc</div></header>
     <div class="body"><div class="req">${p.planet} · Platoon ${pl.platoon} · requires ${req} · ${cands.length} ready</div>
       ${readyList}${nearList}</div>`;
  document.getElementById('ov').classList.add('on');
  document.getElementById('popx').onclick=closePop;
}
function closePop(){document.getElementById('ov').classList.remove('on');}
document.getElementById('ov').onclick=e=>{if(e.target.id==='ov')closePop();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePop();});

function renderMembers(z, act, asn, remaining, board){
  const stat = new Map();                 // idx -> {elig,crit,asn,donations:[]}
  const get = i => { if(!stat.has(i)) stat.set(i,{elig:0,crit:0,asn:0,donations:[]}); return stat.get(i); };
  z.planets.forEach(p=>{
    if (!act.has(p.planet)) return;
    p.platoons.forEach(pl=>pl.slots.forEach((s,si)=>{
      s.cand.forEach(c=>get(c).elig++);
      if (s.cand.length===1) get(s.cand[0]).crit++;
      const a = asn.get(skey(p.planet,pl.platoon,si));
      if (a!=null){ const o=get(a); o.asn++; o.donations.push({name:s.name, crit:s.cand.length===1, planet:p.planet, platoon:pl.platoon}); }
    }));
  });
  const rows = [...stat.entries()].map(([i,o])=>({i,name:memName(i),...o}))
    .filter(r=> r.elig>0 || r.donations.length>0)
    .filter(r=> !filter || r.name.toLowerCase().includes(filter) || r.donations.some(d=>d.name.toLowerCase().includes(filter)))
    .sort((a,b)=> b.asn-a.asn || b.crit-a.crit || b.elig-a.elig);

  board.innerHTML = `<div class="tablewrap"><table class="mtable">
    <thead><tr><th>Member</th><th class="num">Assigned</th><th class="num">Eligible</th>
      <th class="num">Sole&nbsp;filler</th><th>Suggested donations (cap ${CAP}/day)</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td>${r.name}</td>
      <td class="num ${r.asn>=CAP?'maxed':''}">${r.asn}</td>
      <td class="num">${r.elig}</td>
      <td class="num">${r.crit||''}</td>
      <td class="donate">${r.donations.length
        ? r.donations.map(d=>`<span class="u ${d.crit?'crit':''}" title="${d.planet} · Platoon ${d.platoon}${d.crit?' · only candidate':''}">${d.name}</span>`).join('')
        : '<span style="color:var(--ink-faint)">—</span>'}</td></tr>`).join('')}</tbody>
  </table></div>`;
}

document.getElementById('footer').innerHTML =
  `Toggle planets under <b>Active today</b> to focus the daily ${CAP}-donation cap where you're pushing — the assignment re-solves instantly. `+
  `A platoon is only staffed if all 15 slots can be filled at once; ones that can't complete are left empty and cost no donations. `+
  `Hardest completable platoons are locked in first (a heuristic, not the only valid solution). `+
  `Coverage ignores the cap. Data: local Comlink roster + swgoh.wiki platoon map.`;

render();
</script>
