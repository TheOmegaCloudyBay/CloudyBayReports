<head>

<style>
  :root{

    --prog:#d4a029; --prog-bg:rgba(212,160,41,.14);
    --gear:#546074; --gear-bg:rgba(84,96,116,.14);
    --omi:#2bb6c4; --omi-bg:rgba(43,182,196,.16); --gold:#e4b64c;
    --font-display:"Segoe UI",system-ui,-apple-system,sans-serif;
    --font-mono:ui-monospace,"Cascadia Mono","SF Mono",Consolas,"Liberation Mono",monospace;
    --shadow:0 1px 0 rgba(255,255,255,.02),0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#eaeef3; --panel:#ffffff; --panel-2:#f4f6f9;
      --line:#d3dae4; --line-soft:#e4e9f0;
      --ink:#18202c; --ink-dim:#5a6576; --ink-faint:#8b95a4;
      --accent:#cf1730; --accent-glow:rgba(207,23,48,.1);
      --met:#1f8a44; --met-bg:rgba(31,138,68,.13); --met-line:rgba(31,138,68,.4);
      --prog:#a9761a; --prog-bg:rgba(200,150,30,.15);
      --gear:#6b7688; --gear-bg:rgba(107,118,136,.13);
      --omi:#0f8a99; --omi-bg:rgba(15,138,153,.13); --gold:#a97f1e;
      --shadow:0 1px 2px rgba(20,30,50,.06),0 10px 26px rgba(30,45,70,.1);
    }
  }
  :root[data-theme="dark"]{
    --bg:#0b0e14; --panel:#131a25; --panel-2:#1a2331;
    --line:#26313f; --line-soft:#1e2632;
    --ink:#d6dbe4; --ink-dim:#8a94a4; --ink-faint:#5c6674;
    --accent:#e11d33; --accent-glow:rgba(225,29,51,.16);
    --met:#33a852; --met-bg:rgba(51,168,82,.16); --met-line:rgba(51,168,82,.5);
    --prog:#d4a029; --prog-bg:rgba(212,160,41,.14);
    --gear:#546074; --gear-bg:rgba(84,96,116,.14);
    --omi:#2bb6c4; --omi-bg:rgba(43,182,196,.16); --gold:#e4b64c;
    --shadow:0 1px 0 rgba(255,255,255,.02),0 8px 24px rgba(0,0,0,.35);
  }
  :root[data-theme="light"]{
    --bg:#eaeef3; --panel:#ffffff; --panel-2:#f4f6f9;
    --line:#d3dae4; --line-soft:#e4e9f0;
    --ink:#18202c; --ink-dim:#5a6576; --ink-faint:#8b95a4;
    --accent:#cf1730; --accent-glow:rgba(207,23,48,.1);
    --met:#1f8a44; --met-bg:rgba(31,138,68,.13); --met-line:rgba(31,138,68,.4);
    --prog:#a9761a; --prog-bg:rgba(200,150,30,.15);
    --gear:#6b7688; --gear-bg:rgba(107,118,136,.13);
    --omi:#0f8a99; --omi-bg:rgba(15,138,153,.13); --gold:#a97f1e;
    --shadow:0 1px 2px rgba(20,30,50,.06),0 10px 26px rgba(30,45,70,.1);
  }

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-display);line-height:1.5;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(1200px 500px at 80% -10%,var(--accent-glow),transparent 70%)}
  .wrap{max-width:1200px;margin:0 auto;padding:32px 20px 64px}
  .homelink{display:inline-block;font-family:var(--font-mono);font-size:12px;color:var(--ink-dim);text-decoration:none;margin-bottom:12px}
  .homelink:hover{color:var(--accent)}

  .eyebrow{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .head{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;
    border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:24px}
  h1{font-size:clamp(28px,4vw,40px);margin:6px 0 8px;font-weight:800;letter-spacing:.02em;text-wrap:balance}
  .sub{color:var(--ink-dim);font-size:14px;font-family:var(--font-mono)}
  .sub b{color:var(--ink);font-weight:600}
  .req{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:6px 12px;border:1px solid var(--line);
    border-radius:999px;background:var(--panel);font-family:var(--font-mono);font-size:12.5px;color:var(--ink-dim)}
  .req b{color:var(--ink)}

  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:18px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .tile .lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .tile .val{font-family:var(--font-mono);font-size:30px;font-weight:600;margin-top:6px;font-variant-numeric:tabular-nums;
    display:flex;align-items:baseline;gap:6px}
  .tile .val small{font-size:15px;color:var(--ink-faint)}
  .tile.ready{border-color:var(--gold)} .tile.ready .val{color:var(--gold)}
  .tile.caveat{border-color:var(--accent)} .tile.caveat .val{color:var(--accent)}
  .tile .foot{font-size:12px;color:var(--ink-dim);margin-top:4px;font-family:var(--font-mono)}

  .dist{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:22px;box-shadow:var(--shadow)}
  .dist h2{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);margin:0 0 14px;font-weight:700}
  .bars{display:flex;align-items:flex-end;gap:10px;height:96px}
  .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bar .col{width:100%;border-radius:6px 6px 2px 2px;min-height:3px;transition:height .5s cubic-bezier(.2,.7,.2,1)}
  .bar .n{font-family:var(--font-mono);font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
  .bar .k{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint)}

  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
  .controls input[type=search]{flex:1;min-width:180px;background:var(--panel);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:9px 12px;font-family:var(--font-mono);font-size:13px}
  .controls input::placeholder{color:var(--ink-faint)}
  .toggle{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-dim);cursor:pointer;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;user-select:none}
  .toggle input{accent-color:var(--accent)}
  .count{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-faint);margin-left:auto}

  .tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:var(--panel);box-shadow:var(--shadow)}
  table{border-collapse:separate;border-spacing:0;width:100%;min-width:720px}
  thead th{position:sticky;top:0;z-index:2;background:var(--panel-2);color:var(--ink-dim);
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;
    padding:12px 8px;border-bottom:1px solid var(--line);white-space:nowrap}
  thead th.u{cursor:help}
  th.memh{text-align:left;padding-left:18px}
  th.sortable{cursor:pointer} th.sortable:hover{color:var(--ink)}
  th.sep{border-left:1px solid var(--line)}
  th .arrow{color:var(--accent);font-size:10px}
  tbody td{padding:8px;border-bottom:1px solid var(--line-soft);text-align:center;vertical-align:middle}
  td.sep{border-left:1px solid var(--line-soft)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:rgba(127,140,160,.05)}
  .memcell{text-align:left;padding-left:18px;white-space:nowrap}
  .memcell .nm{font-weight:600;font-size:14px}
  .memcell .gp{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);font-variant-numeric:tabular-nums}
  tr.tier-GREEN td{background:linear-gradient(90deg,rgba(51,168,82,.08),transparent 55%)}
  tr.tier-GOLD td{background:linear-gradient(90deg,rgba(228,182,76,.13),transparent 60%)}
  tr.tier-RED td{background:linear-gradient(90deg,rgba(225,29,51,.08),transparent 55%)}
  tr.tier-GREEN .memcell{box-shadow:inset 3px 0 0 var(--met)}
  tr.tier-GOLD .memcell{box-shadow:inset 3px 0 0 var(--gold)}
  tr.tier-RED .memcell{box-shadow:inset 3px 0 0 var(--accent)}

  .chip{display:inline-flex;align-items:center;justify-content:center;min-width:40px;height:28px;padding:0 8px;
    border-radius:7px;font-family:var(--font-mono);font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums;
    border:1px solid transparent}
  .c-met{background:var(--met-bg);color:var(--met);border-color:var(--met-line)}
  .c-prog{background:var(--prog-bg);color:var(--prog);border-color:rgba(212,160,41,.35)}
  .c-gear{background:var(--gear-bg);color:var(--gear);border-color:rgba(84,96,116,.3)}
  .c-miss{background:transparent;color:var(--ink-faint);border:1px dashed var(--line)}

  .prog5{display:flex;gap:3px;justify-content:center}
  .pip{width:12px;height:12px;border-radius:3px;background:var(--line)}
  .pip.on{background:var(--prog)}
  .ptxt{font-family:var(--font-mono);font-size:11px;color:var(--ink-faint);margin-top:3px}

  /* the "cube" ready status */
  .statuscell{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:12px;font-weight:700}
  .cube{width:14px;height:14px;border-radius:3px;flex:0 0 auto;border:1px solid transparent}
  .statuscell.GREEN{color:var(--met)} .cube.GREEN{background:var(--met)}
  .statuscell.GOLD{color:var(--gold)} .cube.GOLD{background:var(--gold);box-shadow:0 0 9px var(--gold)}
  .statuscell.RED{color:var(--accent)} .cube.RED{background:var(--accent)}

  .mk{display:flex;align-items:center;gap:6px;justify-content:center}
  .omi{display:inline-flex;align-items:center;height:28px;padding:0 8px;border-radius:7px;font-family:var(--font-mono);
    font-size:11px;font-weight:700;letter-spacing:.04em}
  .omi.on{background:var(--omi-bg);color:var(--omi);border:1px solid rgba(43,182,196,.45)}
  .omi.off{background:transparent;color:var(--ink-faint);border:1px dashed var(--line)}

  .legend{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;font-size:12.5px;color:var(--ink-dim);font-family:var(--font-mono)}
  .legend span{display:inline-flex;align-items:center;gap:7px}
  .sw{width:14px;height:14px;border-radius:4px;border:1px solid transparent;display:inline-block}
  footer{margin-top:22px;color:var(--ink-faint);font-size:12px;font-family:var(--font-mono);text-align:center;line-height:1.7}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<script>
  const DATA = JSON.parse(document.getElementById('reva-data').textContent);
  const fmt = n => n.toLocaleString('en-US');

  document.getElementById('guildName').textContent = DATA.guild;
  document.getElementById('eyebrow').textContent = DATA.guild + ' · Guild Readiness';
  document.getElementById('genAt').textContent = 'generated ' + DATA.generatedAt;
  document.getElementById('rosterNote').innerHTML = '<b>' + DATA.total + '</b> members scanned';

  const M = DATA.members;

  // stats
  const dist = [0,0,0,0,0,0];
  let omi = 0, ready = 0, green = 0, gold = 0, red = 0, almost = 0;
  M.forEach(m => {
    dist[m.Effective]++;
    if (m.MarrokOmicronOk) omi++;
    if (m.Ready){ ready++;
      if (m.ReadyTier === 'GOLD') gold++; else if (m.ReadyTier === 'RED') red++; else green++;
    } else if (m.Effective === 4) almost++;
  });

  const kpis = [
    {lbl:'Reva Ready', val:ready, of:'/ ' + DATA.total, cls:'ready', foot:'any 5 of 7 at R7'},
    {lbl:'One away', val:almost, of:'at 4/5', foot:'a single relic short'},
    {lbl:'Via 2nd Sister*', val:red, of:'', cls:'caveat', foot:'ready, but may not clear'},
    {lbl:'Marrok + Omicron', val:gold, of:'', foot:'premium filler ★'},
  ];
  document.getElementById('kpis').innerHTML = kpis.map(k => `
    <div class="tile ${k.cls || ''}">
      <div class="lbl">${k.lbl}</div>
      <div class="val">${k.val}<small>${k.of || ''}</small></div>
      <div class="foot">${k.foot || ''}</div>
    </div>`).join('');

  const maxD = Math.max(...dist, 1);
  const rampColor = i => i === 5 ? 'var(--met)' : i === 0 ? 'var(--gear)' : 'var(--prog)';
  document.getElementById('bars').innerHTML = dist.map((n, i) => `
    <div class="bar" title="${n} member(s) at ${i}/5">
      <div class="n">${n}</div>
      <div class="col" style="height:${Math.round(n / maxD * 100)}%;background:${rampColor(i)}"></div>
      <div class="k">${i}/5</div>
    </div>`).join('');

  function cell(c){
    if (!c || !c.Owned) return `<span class="chip c-miss" title="not owned">—</span>`;
    if (c.Ok) return `<span class="chip c-met" title="Relic 7">R7</span>`;
    if (c.Relic > 0) return `<span class="chip c-prog" title="Relic ${c.Relic}">R${c.Relic}</span>`;
    return `<span class="chip c-gear" title="Gear ${c.Gear}, pre-relic">G${c.Gear}</span>`;
  }
  function prog5(m){
    let pips = '';
    for (let i = 0; i < 5; i++) pips += `<span class="pip ${i < m.Effective ? 'on' : ''}"></span>`;
    return `<div class="prog5" title="${m.Effective} of 5 at R7">${pips}</div><div class="ptxt">${m.Effective}/5</div>`;
  }
  function status(m){
    if (!m.Ready) return prog5(m);
    const t = m.ReadyTier;
    const label = t === 'RED' ? 'READY*' : 'READY';
    const title = t === 'RED' ? 'Ready via Second Sister — she can unlock but likely won\'t clear the mission'
                : t === 'GOLD' ? 'Ready — has Marrok at R7 with omicron (premium)'
                : 'Ready with the core Inquisitors';
    return `<div class="statuscell ${t}" title="${title}"><span class="cube ${t}"></span>${label}</div>`;
  }
  function marrok(m){
    const on = m.MarrokOmicronOk;
    const omiEl = `<span class="omi ${on ? 'on' : 'off'}" title="${on ? 'Omicron applied' : 'Omicron ability tier ' + m.MarrokOmicronTier + '/6'}">OMI</span>`;
    return `<div class="mk">${cell(m.Units.Marrok)}${omiEl}</div>`;
  }

  const tierRank = {GOLD:3, GREEN:2, RED:1, NONE:0};
  let sortKey = 'prog', sortDir = -1;
  function sortMembers(list){
    const cmp = {
      name:(a, b) => a.Name.localeCompare(b.Name),
      prog:(a, b) => (a.Ready - b.Ready) || (a.Effective - b.Effective)
                     || (tierRank[a.ReadyTier] - tierRank[b.ReadyTier]) || (a.Gp - b.Gp),
    }[sortKey];
    return [...list].sort((a, b) => cmp(a, b) * sortDir);
  }
  function escapeHtml(s){return s.replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  function render(){
    const q = document.getElementById('q').value.trim().toLowerCase();
    const hide0 = document.getElementById('hide0').checked;
    let list = M.filter(m => (!q || m.Name.toLowerCase().includes(q)) && !(hide0 && m.Effective === 0));
    list = sortMembers(list);
    document.getElementById('rows').innerHTML = list.map(m => `
      <tr class="${m.Ready ? 'tier-' + m.ReadyTier : ''}">
        <td class="memcell"><div class="nm">${escapeHtml(m.Name)}</div><div class="gp">${fmt(m.Gp)} GP</div></td>
        <td>${cell(m.Units.GI)}</td>
        <td>${cell(m.Units["7S"])}</td>
        <td>${cell(m.Units["5B"])}</td>
        <td>${cell(m.Units["8B"])}</td>
        <td>${cell(m.Units["9S"])}</td>
        <td class="sep">${cell(m.Units["2S"])}</td>
        <td>${marrok(m)}</td>
        <td class="sep">${status(m)}</td>
      </tr>`).join('');
    document.getElementById('count').textContent = list.length + ' shown';
    document.querySelectorAll('.arrow').forEach(a => a.textContent = a.dataset.for === sortKey ? (sortDir < 0 ? '▼' : '▲') : '');
  }

  document.getElementById('q').addEventListener('input', render);
  document.getElementById('hide0').addEventListener('change', render);
  document.querySelectorAll('th.sortable').forEach(th => th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = k === 'name' ? 1 : -1; }
    render();
  }));

  document.getElementById('footer').innerHTML =
    'Ready = any 5 of {Grand Inquisitor, Seventh Sister, Fifth Brother, Eighth Brother, Ninth Sister, Second Sister, Marrok} at Relic 7.<br>' +
    '<span style="color:var(--accent)">Red / *</span> = only reaches 5 by counting Second Sister (can unlock, likely won\'t clear). ' +
    '<span style="color:var(--gold)">Gold</span> = Marrok + omicron is the filler. ' +
    'Omicron = <span style="color:var(--omi)">uniqueskill_MARROK01</span> at max tier. ' +
    'Data via self-hosted SWGoH Comlink · read-only · snapshot, re-run to refresh.';

  render();
</script>
