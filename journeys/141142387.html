<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Journey Readiness</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#0b0e14; --panel:#131a25; --panel-2:#1a2331; --line:#26313f; --line-soft:#1e2632;
    --ink:#d6dbe4; --ink-dim:#8a94a4; --ink-faint:#5c6674;
    --accent:#e11d33; --accent-glow:rgba(225,29,51,.16);
    --ok:#33a852; --ok-bg:rgba(51,168,82,.16); --ok-line:rgba(51,168,82,.5);
    --warn:#d4a029; --warn-bg:rgba(212,160,41,.16);
    --relic:#b06be0; --relic-bg:rgba(176,107,224,.16); --relic-line:rgba(176,107,224,.5);
    --gear:#2bb6c4; --gear-bg:rgba(43,182,196,.14); --gold:#e4b64c;
    --font-display:"Segoe UI",system-ui,-apple-system,sans-serif;
    --font-mono:ui-monospace,"Cascadia Mono","SF Mono",Consolas,monospace;
    --shadow:0 1px 0 rgba(255,255,255,.02),0 8px 24px rgba(0,0,0,.35);
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#eaeef3; --panel:#fff; --panel-2:#f4f6f9; --line:#d3dae4; --line-soft:#e4e9f0;
      --ink:#18202c; --ink-dim:#5a6576; --ink-faint:#8b95a4; --accent:#cf1730; --accent-glow:rgba(207,23,48,.1);
      --ok:#1f8a44; --ok-bg:rgba(31,138,68,.13); --ok-line:rgba(31,138,68,.4); --warn:#a9761a; --warn-bg:rgba(200,150,30,.15);
      --relic:#8a3fbf; --relic-bg:rgba(138,63,191,.12); --relic-line:rgba(138,63,191,.4);
      --gear:#0f8a99; --gear-bg:rgba(15,138,153,.12); --gold:#a97f1e;
      --shadow:0 1px 2px rgba(20,30,50,.06),0 10px 26px rgba(30,45,70,.1);}
  }
  :root[data-theme="light"]{ --bg:#eaeef3; --panel:#fff; --panel-2:#f4f6f9; --line:#d3dae4; --line-soft:#e4e9f0;
    --ink:#18202c; --ink-dim:#5a6576; --ink-faint:#8b95a4; --accent:#cf1730; --ok:#1f8a44; --ok-bg:rgba(31,138,68,.13);
    --warn:#a9761a; --warn-bg:rgba(200,150,30,.15); --relic:#8a3fbf; --relic-bg:rgba(138,63,191,.12);
    --gear:#0f8a99; --gear-bg:rgba(15,138,153,.12); --gold:#a97f1e;}
  :root[data-theme="dark"]{ --bg:#0b0e14; --panel:#131a25; --panel-2:#1a2331; --line:#26313f; --ink:#d6dbe4; }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-display);line-height:1.5;
    -webkit-font-smoothing:antialiased;background-image:radial-gradient(1200px 500px at 80% -10%,var(--accent-glow),transparent 70%)}
  .wrap{max-width:1180px;margin:0 auto;padding:28px 18px 80px}
  .homelink{display:inline-block;font-family:var(--font-mono);font-size:12px;color:var(--ink-dim);text-decoration:none;margin-bottom:12px}
  .homelink:hover{color:var(--accent)}
  .eyebrow{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);font-weight:700}
  .head{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:18px}
  h1{font-size:clamp(26px,4vw,38px);margin:6px 0 8px;font-weight:800;letter-spacing:.02em}
  .sub{color:var(--ink-dim);font-size:13.5px;font-family:var(--font-mono)}
  .sub b{color:var(--ink);font-weight:600}

  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel)}
  .seg button{border:0;background:transparent;color:var(--ink-dim);padding:8px 14px;cursor:pointer;font-family:var(--font-mono);font-size:12.5px}
  .seg button.on{background:var(--accent);color:#fff}
  .controls input[type=search]{flex:1;min-width:170px;background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:9px 12px;font-family:var(--font-mono);font-size:13px}
  .count{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-faint);margin-left:auto}

  .ev{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden}
  .ev.unlocked{opacity:.7}
  .evh{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;flex-wrap:wrap}
  .evh .rw{font-weight:800;font-size:16px}
  .evh .tt{color:var(--ink-dim);font-size:12.5px;font-family:var(--font-mono)}
  .evh .ty{font-size:10.5px;font-family:var(--font-mono);color:var(--ink-faint);border:1px solid var(--line);border-radius:999px;padding:2px 9px}
  .evh .badge{margin-left:auto;font-family:var(--font-mono);font-size:12px;font-weight:700;padding:4px 11px;border-radius:999px;border:1px solid transparent}
  .badge.ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-line)}
  .badge.go{color:var(--gold);background:rgba(228,182,76,.14);border-color:var(--gold)}
  .badge.work{color:var(--warn);background:var(--warn-bg);border-color:var(--warn)}
  .badge.faction{color:var(--ink-dim);background:transparent;border:1px dashed var(--line)}
  .prog{height:6px;background:var(--panel-2);border-radius:0}
  .prog .fill{height:100%;background:linear-gradient(90deg,var(--ok),var(--gold))}

  .evbody{padding:0 16px 16px;display:none}
  .ev.open .evbody{display:block}
  .totals{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0 6px}
  @media (max-width:680px){.totals{grid-template-columns:1fr}}
  .tbox{border:1px solid var(--line);border-radius:11px;padding:12px}
  .tbox.relic{border-color:var(--relic-line)} .tbox h4{margin:0 0 9px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;display:flex;gap:8px}
  .tbox.relic h4{color:var(--relic)} .tbox.gear h4{color:var(--gear)}
  .mats{display:flex;flex-wrap:wrap;gap:5px}
  .mat{font-family:var(--font-mono);font-size:11.5px;padding:3px 9px;border-radius:7px;border:1px solid var(--line-soft);background:var(--panel-2)}
  .mat .q{font-weight:700}
  .mat.relic{border-color:var(--relic-line);background:var(--relic-bg)}
  .mat.gear{border-color:rgba(43,182,196,.35);background:var(--gear-bg)}
  .none{font-family:var(--font-mono);font-size:12px;color:var(--ok)}
  .shardline{font-family:var(--font-mono);font-size:12px;color:var(--gold);margin:2px 0 6px}
  .shardline b{color:var(--gold)}
  .shard{color:var(--gold)}

  table{border-collapse:separate;border-spacing:0;width:100%;margin-top:8px}
  th{text-align:right;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;padding:7px 8px;border-bottom:1px solid var(--line)}
  th.l{text-align:left}
  td{padding:6px 8px;border-bottom:1px solid var(--line-soft);text-align:right;font-family:var(--font-mono);font-size:12px;font-variant-numeric:tabular-nums}
  td.l{text-align:left;font-family:var(--font-display);font-size:13px}
  tr.done td{color:var(--ink-faint)}
  tr.urow.exp{cursor:pointer} tr.urow.exp:hover td{background:rgba(127,140,160,.06)}
  .caret{display:inline-block;width:12px;color:var(--ink-faint);font-size:9px;transition:transform .12s}
  tr.urow.open .caret{color:var(--accent);transform:rotate(90deg)}
  tr.udetail{display:none} tr.udetail.show{display:table-row}
  tr.udetail td{background:var(--panel-2);text-align:left;padding:8px 14px 12px 26px}
  .dsec{margin:8px 0} .dsec:first-child{margin-top:2px}
  .dlbl{display:block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:700;margin-bottom:5px}
  .cur{color:var(--ink-dim)} .arw{color:var(--ink-faint)} .req{color:var(--ink);font-weight:600}
  .tick{color:var(--ok)} .no{color:var(--accent)}
  .miss{color:var(--accent);font-size:10px;border:1px solid var(--accent);border-radius:5px;padding:0 5px;margin-left:5px}
  .faccard{padding:0 16px 14px} .faccard .req{font-family:var(--font-mono);font-size:12.5px;color:var(--ink-dim);font-weight:400}
  footer{margin-top:26px;color:var(--ink-faint);font-size:12px;font-family:var(--font-mono);text-align:center;line-height:1.7}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 16px;box-shadow:var(--shadow)}
  .tile .lbl{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .tile .val{font-family:var(--font-mono);font-size:26px;font-weight:600;margin-top:5px}
  .tile .foot{font-size:11.5px;color:var(--ink-dim);margin-top:3px;font-family:var(--font-mono)}
</style>
</head>

<div class="wrap">

  <div id="list"></div>
  <footer id="footer"></footer>
</div>

<script>
const D = JSON.parse(document.getElementById('data').textContent);
const fmt = n => n.toLocaleString('en-US');
let filter = 'locked', q = '', gearMode = 'assembled';

document.getElementById('pname').textContent = D.name + ' — Journey Readiness';
document.getElementById('pmeta').innerHTML = `#${D.allyCode} · L${D.level} · ${D.guild||'—'} · generated ${D.generatedAt}`;

const E = D.events;
const lockedSpecific = E.filter(e=>!e.unlocked && e.hasSpecific);
const unlockedList  = E.filter(e=>e.unlocked);
const factionOnly   = E.filter(e=>!e.unlocked && !e.hasSpecific);
const ready = lockedSpecific.filter(e=>e.needCount===0);

document.getElementById('kpis').innerHTML = [
  {lbl:'Unlocked', val:unlockedList.length, foot:`of ${E.length} events`},
  {lbl:'Ready to enter', val:ready.length, foot:'all reqs met'},
  {lbl:'In progress', val:lockedSpecific.length-ready.length, foot:'need upgrades'},
  {lbl:'Faction-gated', val:factionOnly.length, foot:'own the unit ✓ or bring a faction'},
].map(t=>`<div class="tile"><div class="lbl">${t.lbl}</div><div class="val">${t.val}</div><div class="foot">${t.foot}</div></div>`).join('');

function matChips(list, cls){
  if(!list.length) return '<span class="none">— none —</span>';
  return list.map(m=>`<span class="mat ${cls}">${m.name} <span class="q">×${fmt(m.qty)}</span></span>`).join('');
}
function chipsOf(list, cls){ return list.map(x=>`<span class="mat ${cls}">${x.name} <span class="q">×${fmt(x.qty)}</span></span>`).join(''); }
function unitRow(u){
  const cur = u.owned ? `${u.curStars}★ G${u.curGear}${u.curRelic>0?' R'+u.curRelic:''}` : 'unowned';
  const req = u.kind==='relic'?`7★ R${u.need}`:u.kind==='gear'?`7★ G${u.need}`:'7★';
  const gm = gearMode==='salvage';
  const gList = gm ? u.salvage : u.gear;
  const gCount = gm ? u.salvageCount : u.gearCount;
  const parts=[];
  if(u.relicCount) parts.push(u.relicCount+' relic');
  if(gCount) parts.push(gCount+(gm?' salvage':' gear'));
  if(u.shards) parts.push('<span class="shard">≤'+u.shards+' shards</span>');
  const expandable = !u.done && (u.relicCount || gCount || u.shards);
  const status = u.done ? '<span class="tick">✓</span>' : (parts.length ? parts.join(' + ') : '—');
  const caret = expandable ? '<span class="caret">▸</span>' : '<span class="caret"></span>';
  const main = `<tr class="urow ${u.done?'done':''}${expandable?' exp':''}"${expandable?' onclick="this.classList.toggle(\'open\');this.nextElementSibling.classList.toggle(\'show\')"':''}>
    <td class="l">${caret}${u.name}${u.owned?'':'<span class="miss">unowned</span>'}</td>
    <td class="cur">${cur}</td><td class="arw">→</td><td class="req">${req}</td>
    <td>${status}</td></tr>`;
  if(!expandable) return main;
  const sec=[];
  if(gCount) sec.push(`<div class="dsec"><span class="dlbl">${gm?'Raw salvage to farm':'Gear pieces to assemble'} (${fmt(gCount)})</span><div class="mats">${chipsOf(gList,'gear')}</div></div>`);
  if(u.relicCount) sec.push(`<div class="dsec"><span class="dlbl">Relic materials (${fmt(u.relicCount)})</span><div class="mats">${chipsOf(u.relic,'relic')}</div></div>`);
  if(u.shards) sec.push(`<div class="dsec"><span class="dlbl">Shards</span><span class="shard">up to ${fmt(u.shards)} to reach 7★</span></div>`);
  return main + `<tr class="udetail"><td colspan="5">${sec.join('')}</td></tr>`;
}
function eventCard(e){
  const pct = e.totalUnits? Math.round((e.totalUnits-e.needCount)/e.totalUnits*100):100;
  let badge;
  if(e.unlocked) badge='<span class="badge ok">✓ Unlocked</span>';
  else if(!e.hasSpecific) badge='<span class="badge faction">faction / own-unit</span>';
  else if(e.needCount===0) badge='<span class="badge go">★ Ready to enter</span>';
  else badge=`<span class="badge work">${e.needCount} units to go</span>`;

  const head = `<div class="evh" onclick="this.parentNode.classList.toggle('open')">
    <span class="rw">${e.reward||e.title}</span><span class="tt">${e.title}</span>
    <span class="ty">${e.type}</span>${badge}</div>`;

  if(e.unlocked) return `<div class="ev unlocked">${head}</div>`;
  if(!e.hasSpecific) return `<div class="ev">${head}<div class="faccard"><span class="req">Requires: ${e.requires||'—'}</span></div></div>`;

  const gm = gearMode==='salvage';
  const gTotals = gm ? e.salvageTotals : e.gearTotals;
  const gGrand = gm ? e.salvageGrand : e.gearGrand;
  const body = `<div class="prog"><div class="fill" style="width:${pct}%"></div></div>
   <div class="evbody">
     <div class="totals">
       <div class="tbox relic"><h4>Relic materials still needed (${fmt(e.relicGrand)})</h4><div class="mats">${matChips(e.relicTotals,'relic')}</div></div>
       <div class="tbox gear"><h4>${gm?'Raw salvage to farm':'Gear pieces to assemble'} (${fmt(gGrand)})</h4><div class="mats">${matChips(gTotals.slice(0,18),'gear')}</div></div>
     </div>
     ${e.shardGrand?`<div class="shardline">★ Shards to farm (to 7★): <b>up to ${fmt(e.shardGrand)}</b> across units (banked shards not visible via API) — per-unit below.</div>`:''}
     <table><thead><tr><th class="l">Unit</th><th>Current</th><th></th><th>Req</th><th>Still needs</th></tr></thead>
       <tbody>${e.units.map(unitRow).join('')}</tbody></table>
   </div>`;
  return `<div class="ev">${head}${body}</div>`;
}

function render(){
  document.querySelectorAll('#filter button').forEach(b=>b.classList.toggle('on',b.dataset.f===filter));
  let list = filter==='locked'?lockedSpecific.concat(factionOnly) : filter==='unlocked'?unlockedList : E.slice();
  // sort: ready first, then fewest units to go; faction & unlocked sink
  list = list.slice().sort((a,b)=>{
    const ra=a.unlocked?3:(!a.hasSpecific?2:0), rb=b.unlocked?3:(!b.hasSpecific?2:0);
    if(ra!==rb) return ra-rb;
    return (a.needCount??99)-(b.needCount??99);
  });
  if(q) list = list.filter(e=> (e.reward||'').toLowerCase().includes(q) || e.title.toLowerCase().includes(q)
      || (e.units||[]).some(u=>u.name.toLowerCase().includes(q)));
  document.getElementById('list').innerHTML = list.map(eventCard).join('') || '<div class="sub">no events</div>';
  document.getElementById('count').textContent = list.length+' events';
}
document.querySelectorAll('#filter button').forEach(b=>b.onclick=()=>{filter=b.dataset.f;render();});
document.querySelectorAll('#gearmode button').forEach(b=>b.onclick=()=>{
  gearMode=b.dataset.g;
  document.querySelectorAll('#gearmode button').forEach(x=>x.classList.toggle('on',x===b));
  render();
});
document.getElementById('q').addEventListener('input',e=>{q=e.target.value.toLowerCase();render();});
render();

document.getElementById('footer').innerHTML =
  `Requirements scraped from swgoh.wiki (+ manual entries for rotating events not on the wiki); relic/gear/shard costs from game data. `+
  `Every unit is also required at 7★ — shard counts are an upper bound ("up to"): banked shards aren't exposed by the API. `+
  `Gear toggle: "Assembled" = full pieces you equip; "Raw salvage" = the components you farm/buy (a from-zero shopping list — your current inventory isn't visible). `+
  `Relic requirements include gear to G13 first. Events unlock when you own the reward unit.`;
</script>
</body>
